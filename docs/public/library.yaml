openapi: 3.0.0
info:
  title: Library API
  version: 1.0.0
  description: API for managing Students, Books, and Borrow records

servers:
  - url: http://127.0.0.1:5000

paths:

  /books:
    get:
      summary: Get all books
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

    post:
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Book created

  /books/{book_id}:
    get:
      summary: Get book by ID
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not found

    put:
      summary: Update book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

  /students:
    get:
      summary: Get all students
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Student'

    post:
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentInput'
      responses:
        '201':
          description: Created

  /students/{student_id}:
    get:
      summary: Get student by ID
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Student data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'

    put:
      summary: Update student
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentInput'
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete student
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

  /borrows:
    get:
      summary: Get all borrows
      responses:
        '200':
          description: List of borrows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Borrow'

    post:
      summary: Create borrow record
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorrowInput'
      responses:
        '201':
          description: Created

  /borrows/{borrow_id}:
    get:
      summary: Get borrow by ID
      parameters:
        - name: borrow_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Borrow data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Borrow'

    put:
      summary: Update borrow
      parameters:
        - name: borrow_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorrowInput'
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete borrow
      parameters:
        - name: borrow_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

components:
  schemas:

    Book:
      type: object
      properties:
        book_id:
          type: integer
        title:
          type: string
        category:
          type: string
        edition:
          type: string
        publisher:
          type: string

    BookInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        category:
          type: string
        edition:
          type: string
        publisher:
          type: string

    Student:
      type: object
      properties:
        student_id:
          type: integer
        name:
          type: string
        dept:
          type: string

    StudentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        dept:
          type: string

    Borrow:
      type: object
      properties:
        borrow_id:
          type: integer
        student_id:
          type: integer
        book_id:
          type: integer
        borrow_date:
          type: string

    BorrowInput:
      type: object
      required: [student_id, book_id, borrow_date]
      properties:
        student_id:
          type: integer
        book_id:
          type: integer
        borrow_date:
          type: string